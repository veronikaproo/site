<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Veronika</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--pink:#ff5fa2;
--blue:#67d5ff;
--white:#ffffff;
--dark:#0c1020;
--glass:rgba(255,255,255,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
scroll-behavior:smooth;
}

body{
background:#090b18;
color:white;
overflow-x:hidden;
}

/* Animated Background */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%,rgba(255,95,162,.25),transparent 30%),
radial-gradient(circle at 85% 30%,rgba(103,213,255,.25),transparent 30%),
radial-gradient(circle at 50% 85%,rgba(255,95,162,.2),transparent 40%),
linear-gradient(135deg,#090b18,#11162b,#090b18);
z-index:-3;
animation:bgMove 15s infinite alternate;
}

@keyframes bgMove{
100%{
filter:hue-rotate(25deg);
}
}

nav{

position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

width:min(1100px,90%);

padding:16px 30px;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:20px;

border:1px solid rgba(255,255,255,.12);

z-index:100;

}

.logo{

font-size:28px;
font-weight:700;

background:linear-gradient(90deg,var(--pink),var(--blue));

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

nav a{

color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;

}

nav a:hover{

color:var(--blue);

}

.hero{

padding:170px 10% 90px;

text-align:center;

}

.hero h1{

font-size:72px;

margin-bottom:20px;

background:linear-gradient(90deg,var(--pink),var(--blue));

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero p{

max-width:700px;

margin:auto;

line-height:1.8;

color:#d4d4d4;

font-size:18px;

}

.gallery{

width:min(1300px,90%);

margin:auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:30px;

padding-bottom:100px;

}

.card{

position:relative;

overflow:hidden;

border-radius:26px;

height:450px;

background:#1c2238;

border:1px solid rgba(255,255,255,.12);

transition:.45s;

cursor:pointer;

}

.card img{

width:100%;
height:100%;
object-fit:cover;
transition:.6s;

}

.card:hover{

transform:translateY(-12px);

box-shadow:

0 0 30px rgba(255,95,162,.25),

0 0 45px rgba(103,213,255,.25);

}

.card:hover img{

transform:scale(1.08);

}

.overlay{

position:absolute;

bottom:0;

left:0;

width:100%;

padding:30px;

background:linear-gradient(transparent,rgba(0,0,0,.92));

transform:translateY(100%);

transition:.4s;

}

.card:hover .overlay{

transform:translateY(0);

}

.overlay h3{

font-size:28px;

}

.overlay p{

opacity:.75;

margin-top:5px;

}

.back{

display:inline-block;

margin-top:45px;

padding:16px 35px;

border-radius:50px;

text-decoration:none;

font-weight:600;

background:linear-gradient(90deg,var(--pink),var(--blue));

color:white;

transition:.35s;

}

.back:hover{

transform:translateY(-5px);

box-shadow:0 0 35px rgba(103,213,255,.4);

}

@media(max-width:800px){

.hero h1{
font-size:48px;
}

nav{

padding:15px 20px;

}

nav div:last-child{

display:none;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">

VERONIKA

<a href="#">Portfolio</a>

</div>
